<script>
(function() {
  const supa = window.supabaseClient;
  if (!supa) {
    console.error('❌ Supabase no está inicializado (window.supabaseClient).');
  }

  const estado = {
    registros: [],
    bodegasPrincipales: [],
    bodegasSecundarias: [],
    secundariasPorPrincipal: new Map(),
    eventos: [],
    estadosProceso: [],
    actualizandoIds: new Set(),
    modalRegistroId: null
  };

  const ESTADOS_FALTANTE = [
    'pendiente_investigacion',
    'en_revision',
    'aclarado',
    'resuelto',
    'cerrado'
  ];

  function normalizarTexto(valor) {
    return (valor || '')
      .toString()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim()
      .toLowerCase();
  }

  function escapeHtml(valor) {
    return (valor || '')
      .toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function parseLocalDate(value) {
    const raw = (value || '').toString().trim();
    if (!raw) return null;

    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
      const parts = raw.split('-').map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    const date = new Date(raw);
    return Number.isNaN(date.getTime()) ? null : date;
  }

  function toDateInputValue(value) {
    const date = parseLocalDate(value);
    if (!date) return '';
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function formatDateOnly(value) {
    const raw = (value || '').toString().trim();
    if (!raw) return '–';

    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
      const parts = raw.split('-');
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    const date = new Date(raw);
    if (Number.isNaN(date.getTime())) return raw;
    return date.toLocaleDateString('es-NI');
  }

  function formatDateTime(value) {
    if (!value) return '–';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return formatDateOnly(value);
    return date.toLocaleString('es-NI');
  }

  function formatNumber(value) {
    return Number(value || 0).toLocaleString('es-NI');
  }

  function formatEstadoTexto(value) {
    const raw = (value || '').toString().trim();
    if (!raw) return 'Sin estado';
    return raw
      .replace(/_/g, ' ')
      .replace(/\b\w/g, (match) => match.toUpperCase());
  }

  function estadoProcesoLabel(value) {
    const raw = (value || '').toString().trim();
    if (!raw) return { text: 'Sin estado', className: '' };

    const normalizado = normalizarTexto(raw);
    if (normalizado.includes('resuelto') || normalizado.includes('cerrado')) {
      return { text: formatEstadoTexto(raw), className: 'estado-resuelto' };
    }
    if (normalizado.includes('pendiente')) {
      return { text: formatEstadoTexto(raw), className: 'estado-pendiente' };
    }
    return { text: formatEstadoTexto(raw), className: 'estado-investigacion' };
  }

  function hoyLocalIso() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function requiereNotaDeCierre(estadoProceso) {
    const valor = (estadoProceso || '').toString().trim();
    return ['aclarado', 'resuelto', 'cerrado'].includes(valor);
  }

  function obtenerRegistroPorId(id) {
    return (estado.registros || []).find((registro) => String(registro.id) === String(id)) || null;
  }

  function actualizarRegistroLocal(id, cambios) {
    estado.registros = (estado.registros || []).map((registro) => {
      if (String(registro.id) !== String(id)) return registro;
      return { ...registro, ...cambios };
    });
  }

  function construirOpcionesEstado(actual) {
    return ESTADOS_FALTANTE.map((value) => {
      const selected = value === actual ? 'selected' : '';
      return `<option value="${escapeHtml(value)}" ${selected}>${escapeHtml(formatEstadoTexto(value))}</option>`;
    }).join('');
  }

  function construirEditorEstado(registro) {
    const actualizando = estado.actualizandoIds.has(String(registro.id));
    const labelEstado = estadoProcesoLabel(registro.estado_proceso);
    const fechaProceso = registro.fecha_proceso ? formatDateOnly(registro.fecha_proceso) : '–';
    const nota = registro.notas_proceso || '';

    return `
      <div class="faltantes-estado-editor">
        <div>
          <span class="bodega-chip ${labelEstado.className}">${escapeHtml(labelEstado.text)}</span>
          <span class="faltantes-estado-meta">Fecha proceso: ${escapeHtml(fechaProceso)}</span>
          <span class="faltantes-estado-meta">Nota actual: ${escapeHtml(nota || 'Sin notas')}</span>
        </div>
        <button class="faltantes-estado-open" data-role="estado-open" data-id="${escapeHtml(registro.id)}" ${actualizando ? 'disabled' : ''}>${actualizando ? 'Guardando...' : 'Gestionar estado'}</button>
        <span class="faltantes-estado-feedback${registro.__estadoFeedbackType ? ` ${registro.__estadoFeedbackType}` : ''}">${escapeHtml(registro.__estadoFeedback || '')}</span>
      </div>`;
  }

  function abrirModalEstado(id) {
    const registro = obtenerRegistroPorId(id);
    const modal = document.getElementById('modal-estado-faltante');
    if (!registro || !modal) return;

    estado.modalRegistroId = String(id);

    const labelEstado = estadoProcesoLabel(registro.estado_proceso);
    const resumen = `${registro.material_codigo || '–'} • ${registro.material_nombre || '–'} • ${registro.evento || 'Sin evento'}`;
    const fechaProceso = registro.fecha_proceso ? formatDateOnly(registro.fecha_proceso) : '–';
    const notaActual = registro.notas_proceso || 'Sin notas';

    document.getElementById('modal-estado-faltante-resumen').textContent = resumen;
    const chip = document.getElementById('modal-estado-chip-actual');
    chip.className = `bodega-chip ${labelEstado.className}`;
    chip.textContent = labelEstado.text;
    document.getElementById('modal-estado-meta').textContent = `Fecha proceso: ${fechaProceso} • Nota actual: ${notaActual}`;
    document.getElementById('modal-estado-select').innerHTML = construirOpcionesEstado(registro.estado_proceso || 'pendiente_investigacion');
    document.getElementById('modal-estado-nota').value = registro.notas_proceso || '';
    document.getElementById('modal-estado-feedback').textContent = registro.__estadoFeedback || '';
    document.getElementById('modal-estado-feedback').className = `faltantes-estado-feedback${registro.__estadoFeedbackType ? ` ${registro.__estadoFeedbackType}` : ''}`;
    document.getElementById('btn-guardar-modal-estado-faltante').disabled = estado.actualizandoIds.has(String(id));
    modal.style.display = 'flex';
  }

  function cerrarModalEstado() {
    estado.modalRegistroId = null;
    const modal = document.getElementById('modal-estado-faltante');
    if (modal) modal.style.display = 'none';
  }

  function poblarSelect(selectId, values, emptyValue, emptyLabel) {
    const select = document.getElementById(selectId);
    if (!select) return;
    const actual = select.value || emptyValue;
    const opciones = [`<option value="${escapeHtml(emptyValue)}">${escapeHtml(emptyLabel)}</option>`];
    (values || []).forEach(value => {
      const safeValue = escapeHtml(value);
      opciones.push(`<option value="${safeValue}">${safeValue}</option>`);
    });
    select.innerHTML = opciones.join('');
    const disponibles = new Set([emptyValue, ...(values || [])]);
    select.value = disponibles.has(actual) ? actual : emptyValue;
  }

  function poblarSelectSecundaria(principalSeleccionada) {
    const principal = principalSeleccionada || 'todas';
    let secundarias = [];
    if (principal === 'todas') {
      secundarias = estado.bodegasSecundarias || [];
    } else {
      const set = estado.secundariasPorPrincipal.get(principal) || new Set();
      secundarias = Array.from(set).sort((a, b) => a.localeCompare(b));
    }
    poblarSelect('filtro-faltantes-bodega-secundaria', secundarias, 'todas', 'Todas');
  }

  function obtenerCampoFechaRegistro(registro, campoFecha) {
    if (campoFecha === 'fecha_despacho') return registro.fecha_despacho || null;
    if (campoFecha === 'created_at') return registro.created_at || null;
    return registro.fecha_devolucion || registro.fecha_despacho || registro.created_at || null;
  }

  function obtenerRegistrosFiltrados() {
    const busqueda = document.getElementById('filtro-faltantes-busqueda')?.value || '';
    const bodegaPrincipal = document.getElementById('filtro-faltantes-bodega-principal')?.value || 'todas';
    const bodegaSecundaria = document.getElementById('filtro-faltantes-bodega-secundaria')?.value || 'todas';
    const evento = document.getElementById('filtro-faltantes-evento')?.value || 'todos';
    const estadoProceso = document.getElementById('filtro-faltantes-estado')?.value || 'todos';
    const tipoFecha = document.getElementById('filtro-faltantes-tipo-fecha')?.value || 'fecha_devolucion';
    const desde = document.getElementById('filtro-faltantes-desde')?.value || '';
    const hasta = document.getElementById('filtro-faltantes-hasta')?.value || '';

    const termino = normalizarTexto(busqueda);
    const fechaDesde = parseLocalDate(desde);
    const fechaHasta = parseLocalDate(hasta);
    if (fechaHasta) fechaHasta.setHours(23, 59, 59, 999);

    return (estado.registros || []).filter(registro => {
      if (bodegaPrincipal !== 'todas' && (registro.bodega_principal || '') !== bodegaPrincipal) {
        return false;
      }
      if (bodegaSecundaria !== 'todas' && (registro.bodega_secundaria || '') !== bodegaSecundaria) {
        return false;
      }
      if (evento !== 'todos' && (registro.evento || '') !== evento) {
        return false;
      }
      if (estadoProceso !== 'todos' && (registro.estado_proceso || 'pendiente_investigacion') !== estadoProceso) {
        return false;
      }

      if (termino) {
        const campos = [
          registro.material_codigo,
          registro.material_nombre,
          registro.evento,
          registro.numero_despacho,
          registro.encargado_evento,
          registro.bodega_principal,
          registro.bodega_secundaria,
          registro.ubicacion_nombre,
          registro.observacion,
          registro.observacion_detalle,
          registro.estado_proceso
        ];
        const coincide = campos.some(campo => normalizarTexto(campo).includes(termino));
        if (!coincide) return false;
      }

      if (fechaDesde || fechaHasta) {
        const valorFecha = obtenerCampoFechaRegistro(registro, tipoFecha);
        const fechaRegistro = parseLocalDate(valorFecha);
        if (!fechaRegistro) return false;
        if (fechaDesde && fechaRegistro < fechaDesde) return false;
        if (fechaHasta && fechaRegistro > fechaHasta) return false;
      }

      return true;
    }).sort((a, b) => {
      const fechaA = parseLocalDate(obtenerCampoFechaRegistro(a, tipoFecha));
      const fechaB = parseLocalDate(obtenerCampoFechaRegistro(b, tipoFecha));
      const timeA = fechaA ? fechaA.getTime() : 0;
      const timeB = fechaB ? fechaB.getTime() : 0;
      return timeB - timeA;
    });
  }

  function actualizarResumenFiltros(registros) {
    const resumen = document.getElementById('resumen-filtros-faltantes');
    if (!resumen) return;

    const partes = [];
    const bodegaPrincipal = document.getElementById('filtro-faltantes-bodega-principal')?.value || 'todas';
    const bodegaSecundaria = document.getElementById('filtro-faltantes-bodega-secundaria')?.value || 'todas';
    const evento = document.getElementById('filtro-faltantes-evento')?.value || 'todos';
    const estadoProceso = document.getElementById('filtro-faltantes-estado')?.value || 'todos';
    const tipoFecha = document.getElementById('filtro-faltantes-tipo-fecha')?.selectedOptions?.[0]?.textContent || 'Fecha devolución';
    const desde = document.getElementById('filtro-faltantes-desde')?.value || '';
    const hasta = document.getElementById('filtro-faltantes-hasta')?.value || '';
    const busqueda = document.getElementById('filtro-faltantes-busqueda')?.value || '';

    if (busqueda) partes.push(`<strong>Búsqueda:</strong> ${escapeHtml(busqueda)}`);
    if (bodegaPrincipal !== 'todas') partes.push(`<strong>Bodega principal:</strong> ${escapeHtml(bodegaPrincipal)}`);
    if (bodegaSecundaria !== 'todas') partes.push(`<strong>Bodega secundaria:</strong> ${escapeHtml(bodegaSecundaria)}`);
    if (evento !== 'todos') partes.push(`<strong>Evento:</strong> ${escapeHtml(evento)}`);
    if (estadoProceso !== 'todos') partes.push(`<strong>Estado:</strong> ${escapeHtml(formatEstadoTexto(estadoProceso))}`);
    if (desde || hasta) {
      partes.push(`<strong>${escapeHtml(tipoFecha)}:</strong> ${escapeHtml(formatDateOnly(desde))} a ${escapeHtml(formatDateOnly(hasta))}`);
    }

    partes.push(`<strong>Resultados:</strong> ${formatNumber(registros.length)} registros`);
    resumen.innerHTML = partes.join(' &nbsp;•&nbsp; ');
    resumen.style.display = 'block';
  }

  function actualizarKpis(registros) {
    const eventos = new Set();
    const bodegas = new Set();
    const totalUnidades = registros.reduce((acc, registro) => acc + Number(registro.cantidad_faltante || 0), 0);

    registros.forEach(registro => {
      if (registro.evento) eventos.add(registro.evento);
      const combo = [registro.bodega_principal || '', registro.bodega_secundaria || ''].filter(Boolean).join(' / ');
      if (combo) bodegas.add(combo);
    });

    document.getElementById('kpi-faltantes-registros').textContent = formatNumber(registros.length);
    document.getElementById('kpi-faltantes-unidades').textContent = formatNumber(totalUnidades);
    document.getElementById('kpi-faltantes-eventos').textContent = formatNumber(eventos.size);
    document.getElementById('kpi-faltantes-bodegas').textContent = formatNumber(bodegas.size);
  }

  async function actualizarEstadoRegistro(id, nuevoEstado, notaProceso) {
    const registro = obtenerRegistroPorId(id);
    if (!registro) {
      alert('No se encontró el registro a actualizar.');
      return;
    }

    const estadoFinal = (nuevoEstado || 'pendiente_investigacion').toString().trim();
    const notaFinal = (notaProceso || '').toString().trim();
    const fechaProceso = estadoFinal === 'pendiente_investigacion' ? null : hoyLocalIso();

    if (requiereNotaDeCierre(estadoFinal) && !notaFinal) {
      actualizarRegistroLocal(id, {
        __estadoFeedback: 'Debe agregar una nota para dejar constancia del cierre o aclaración.',
        __estadoFeedbackType: 'error'
      });
      renderizar();

      const feedbackEl = document.getElementById('modal-estado-feedback');
      if (feedbackEl) {
        feedbackEl.textContent = 'Debe agregar una nota para dejar constancia del cierre o aclaración.';
        feedbackEl.className = 'faltantes-estado-feedback error';
      }
      return;
    }

    estado.actualizandoIds.add(String(id));
    actualizarRegistroLocal(id, {
      __estadoFeedback: 'Guardando cambios...',
      __estadoFeedbackType: ''
    });
    renderizar();

    const saveBtn = document.getElementById('btn-guardar-modal-estado-faltante');
    const feedbackEl = document.getElementById('modal-estado-feedback');
    if (estado.modalRegistroId === String(id) && saveBtn && feedbackEl) {
      saveBtn.disabled = true;
      feedbackEl.textContent = 'Guardando cambios...';
      feedbackEl.className = 'faltantes-estado-feedback';
    }

    try {
      let payload = {
        estado_proceso: estadoFinal,
        fecha_proceso: fechaProceso,
        notas_proceso: notaFinal || null,
        updated_at: new Date().toISOString()
      };

      let respuesta = await supa
        .from('materiales_faltantes')
        .update(payload)
        .eq('id', id)
        .select('id, estado_proceso, fecha_proceso, notas_proceso, updated_at')
        .single();

      if (respuesta.error && (respuesta.error.code === '42703' || /fecha_proceso|notas_proceso|updated_at/i.test(respuesta.error.message || ''))) {
        payload = {
          estado_proceso: estadoFinal
        };

        respuesta = await supa
          .from('materiales_faltantes')
          .update(payload)
          .eq('id', id)
          .select('id, estado_proceso')
          .single();
      }

      if (respuesta.error) throw respuesta.error;

      actualizarRegistroLocal(id, {
        estado_proceso: respuesta.data?.estado_proceso || estadoFinal,
        fecha_proceso: respuesta.data?.fecha_proceso ?? fechaProceso,
        notas_proceso: respuesta.data?.notas_proceso ?? notaFinal,
        __estadoFeedback: 'Estado actualizado.',
        __estadoFeedbackType: 'ok'
      });

      if (estado.modalRegistroId === String(id) && feedbackEl) {
        feedbackEl.textContent = 'Estado actualizado.';
        feedbackEl.className = 'faltantes-estado-feedback ok';
      }

      cerrarModalEstado();
    } catch (error) {
      console.error('Error actualizando estado de material faltante:', error);
      actualizarRegistroLocal(id, {
        __estadoFeedback: `Error: ${error.message || 'No se pudo actualizar.'}`,
        __estadoFeedbackType: 'error'
      });

      if (estado.modalRegistroId === String(id) && feedbackEl) {
        feedbackEl.textContent = `Error: ${error.message || 'No se pudo actualizar.'}`;
        feedbackEl.className = 'faltantes-estado-feedback error';
      }
    } finally {
      estado.actualizandoIds.delete(String(id));
      if (estado.modalRegistroId === String(id) && saveBtn) {
        saveBtn.disabled = false;
      }
      renderizar();

      if (estado.modalRegistroId === String(id)) {
        abrirModalEstado(id);
      }
    }
  }

  async function cargarMaterialesFaltantes() {
    if (!supa) return;

    const cont = document.getElementById('tabla-materiales-faltantes');
    if (cont) {
      cont.innerHTML = '<p style="color:#cbd5e1; text-align:center; margin-top:40px;">Cargando materiales faltantes…</p>';
    }

    let registros = null;
    let errorConsulta = null;

    try {
      const respuesta = await supa
        .from('materiales_faltantes')
        .select('id, material_codigo, material_nombre, cantidad_faltante, cantidad_despachada, bodega_principal, bodega_secundaria, ubicacion_codigo, ubicacion_nombre, numero_despacho, evento, encargado_evento, fecha_despacho, fecha_devolucion, responsable_devolucion, observacion, observacion_detalle, estado_proceso, fecha_proceso, notas_proceso, created_at')
        .order('created_at', { ascending: false })
        .limit(5000);

      registros = respuesta.data;
      errorConsulta = respuesta.error;
    } catch (error) {
      errorConsulta = error;
    }

    if (errorConsulta && (errorConsulta.code === '42703' || /fecha_devolucion/i.test(errorConsulta.message || ''))) {
      const respuestaFallback = await supa
        .from('materiales_faltantes')
        .select('id, material_codigo, material_nombre, cantidad_faltante, cantidad_despachada, bodega_principal, bodega_secundaria, ubicacion_codigo, ubicacion_nombre, numero_despacho, evento, encargado_evento, fecha_despacho, responsable_devolucion, observacion, observacion_detalle, estado_proceso, fecha_proceso, notas_proceso, created_at')
        .order('created_at', { ascending: false })
        .limit(5000);

      registros = (respuestaFallback.data || []).map(item => ({
        ...item,
        fecha_devolucion: null
      }));
      errorConsulta = respuestaFallback.error;
    }

    if (errorConsulta) {
      console.error('Error cargando materiales_faltantes:', errorConsulta);
      if (cont) {
        cont.innerHTML = `<p style="color:#ef4444; text-align:center; margin-top:40px;">Error cargando materiales faltantes: ${escapeHtml(errorConsulta.message || 'Desconocido')}</p>`;
      }
      return;
    }

    estado.registros = (registros || []).map(item => ({
      ...item,
      material_codigo: (item.material_codigo || '').toString().trim(),
      material_nombre: (item.material_nombre || '').toString().trim(),
      bodega_principal: (item.bodega_principal || '').toString().trim(),
      bodega_secundaria: (item.bodega_secundaria || '').toString().trim(),
      evento: (item.evento || '').toString().trim(),
      numero_despacho: (item.numero_despacho || '').toString().trim(),
      encargado_evento: (item.encargado_evento || '').toString().trim(),
      responsable_devolucion: (item.responsable_devolucion || '').toString().trim(),
      observacion: (item.observacion || '').toString().trim(),
      observacion_detalle: (item.observacion_detalle || '').toString().trim(),
      estado_proceso: (item.estado_proceso || 'pendiente_investigacion').toString().trim(),
      fecha_proceso: item.fecha_proceso || null,
      notas_proceso: (item.notas_proceso || '').toString().trim(),
      __estadoFeedback: '',
      __estadoFeedbackType: ''
    }));

    const principales = new Set();
    const secundarias = new Set();
    const eventos = new Set();
    const estadosProceso = new Set();
    const secundariasPorPrincipal = new Map();

    estado.registros.forEach(registro => {
      if (registro.bodega_principal) principales.add(registro.bodega_principal);
      if (registro.bodega_secundaria) secundarias.add(registro.bodega_secundaria);
      if (registro.evento) eventos.add(registro.evento);
      if (registro.estado_proceso) estadosProceso.add(registro.estado_proceso);
      if (registro.bodega_principal && registro.bodega_secundaria) {
        if (!secundariasPorPrincipal.has(registro.bodega_principal)) {
          secundariasPorPrincipal.set(registro.bodega_principal, new Set());
        }
        secundariasPorPrincipal.get(registro.bodega_principal).add(registro.bodega_secundaria);
      }
    });

    estado.bodegasPrincipales = Array.from(principales).sort((a, b) => a.localeCompare(b));
    estado.bodegasSecundarias = Array.from(secundarias).sort((a, b) => a.localeCompare(b));
    estado.eventos = Array.from(eventos).sort((a, b) => a.localeCompare(b));
    estado.estadosProceso = Array.from(estadosProceso).sort((a, b) => a.localeCompare(b));
    estado.secundariasPorPrincipal = secundariasPorPrincipal;

    poblarSelect('filtro-faltantes-bodega-principal', estado.bodegasPrincipales, 'todas', 'Todas');
    poblarSelectSecundaria('todas');
    poblarSelect('filtro-faltantes-evento', estado.eventos, 'todos', 'Todos');
    poblarSelect('filtro-faltantes-estado', estado.estadosProceso, 'todos', 'Todos');

    const fechas = estado.registros
      .map(registro => registro.fecha_devolucion || registro.fecha_despacho || registro.created_at)
      .map(parseLocalDate)
      .filter(Boolean)
      .sort((a, b) => a - b);

    if (fechas.length) {
      document.getElementById('filtro-faltantes-desde').value = toDateInputValue(fechas[0]);
      document.getElementById('filtro-faltantes-hasta').value = toDateInputValue(fechas[fechas.length - 1]);
    }

    renderizar();
  }

  function loadXlsxLib() {
    return new Promise((resolve, reject) => {
      if (window.XLSX) return resolve(window.XLSX);
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js';
      script.onload = () => resolve(window.XLSX);
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  async function exportarExcel() {
    try {
      const registros = obtenerRegistrosFiltrados();
      if (!registros.length) {
        alert('No hay materiales faltantes para exportar.');
        return;
      }

      await loadXlsxLib();

      const wb = XLSX.utils.book_new();
      const resumenRows = [
        { Indicador: 'Registros', Valor: registros.length },
        { Indicador: 'Unidades faltantes', Valor: registros.reduce((acc, item) => acc + Number(item.cantidad_faltante || 0), 0) },
        { Indicador: 'Eventos', Valor: new Set(registros.map(item => item.evento).filter(Boolean)).size },
        { Indicador: 'Bodegas', Valor: new Set(registros.map(item => `${item.bodega_principal || ''}/${item.bodega_secundaria || ''}`).filter(Boolean)).size }
      ];

      const wsResumen = XLSX.utils.json_to_sheet(resumenRows);
      XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');

      const wsDetalle = XLSX.utils.json_to_sheet(construirRowsExcel(registros));
      XLSX.utils.book_append_sheet(wb, wsDetalle, 'Faltantes');

      const filename = `Materiales_Faltantes_${new Date().toISOString().slice(0, 10)}.xlsx`;
      XLSX.writeFile(wb, filename);
    } catch (error) {
      console.error('Error exportando XLSX faltantes:', error);
      alert('Error exportando Excel. Revisa la consola.');
    }
  }

      }

      if (window.electronAPI && typeof window.electronAPI.renderHtmlToPdf === 'function') {
        const resultado = await window.electronAPI.renderHtmlToPdf({
          filename: `Materiales_Faltantes_${new Date().toISOString().slice(0, 10)}.pdf`,
          html: construirHtmlPdf(registros),
          baseUrl: document.baseURI
        });
        if (resultado && resultado.canceled === false) {
          alert('PDF guardado en: ' + resultado.filePath);
        }
        return;
      }

      if (typeof html2pdf === 'undefined') {
        alert('No se encontró un motor de exportación PDF disponible.');
        return;
      }

      const contenedor = document.createElement('div');
      contenedor.innerHTML = construirHtmlPdf(registros);
      await html2pdf().from(contenedor).set({
        margin: 10,
        filename: `Materiales_Faltantes_${new Date().toISOString().slice(0, 10)}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      }).save();
    } catch (error) {
      console.error('Error exportando PDF faltantes:', error);
      alert('Error exportando PDF. Revisa la consola.');
    }
  }

  document.getElementById('filtro-faltantes-bodega-principal')?.addEventListener('change', (event) => {
    poblarSelectSecundaria(event.target.value || 'todas');
    renderizar();
  });
  document.getElementById('filtro-faltantes-bodega-secundaria')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-evento')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-estado')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-tipo-fecha')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-desde')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-hasta')?.addEventListener('change', renderizar);
  document.getElementById('filtro-faltantes-busqueda')?.addEventListener('input', renderizar);
  document.getElementById('btn-limpiar-filtros-faltantes')?.addEventListener('click', () => {
    document.getElementById('filtro-faltantes-busqueda').value = '';
    document.getElementById('filtro-faltantes-bodega-principal').value = 'todas';
    poblarSelectSecundaria('todas');
    document.getElementById('filtro-faltantes-bodega-secundaria').value = 'todas';
    document.getElementById('filtro-faltantes-evento').value = 'todos';
    document.getElementById('filtro-faltantes-estado').value = 'todos';
    document.getElementById('filtro-faltantes-tipo-fecha').value = 'fecha_devolucion';

    const fechas = (estado.registros || [])
      .map(registro => registro.fecha_devolucion || registro.fecha_despacho || registro.created_at)
      .map(parseLocalDate)
      .filter(Boolean)
      .sort((a, b) => a - b);
    document.getElementById('filtro-faltantes-desde').value = fechas.length ? toDateInputValue(fechas[0]) : '';
    document.getElementById('filtro-faltantes-hasta').value = fechas.length ? toDateInputValue(fechas[fechas.length - 1]) : '';
    renderizar();
  });
  document.getElementById('btn-exportar-xfaltantes')?.addEventListener('click', exportarPdf);
  document.getElementById('btn-exportar-xfaltantes-xlsx')?.addEventListener('click', exportarExcel);
  document.getElementById('tabla-materiales-faltantes')?.addEventListener('click', async (event) => {
    const button = event.target.closest('[data-role="estado-open"]');
    if (!button) return;

    abrirModalEstado(button.dataset.id);
  });

  document.getElementById('btn-cerrar-modal-estado-faltante')?.addEventListener('click', cerrarModalEstado);
  document.getElementById('modal-estado-faltante')?.addEventListener('click', (event) => {
    if (event.target.id === 'modal-estado-faltante') {
      cerrarModalEstado();
    }
  });
  document.getElementById('btn-guardar-modal-estado-faltante')?.addEventListener('click', async () => {
    if (!estado.modalRegistroId) return;

    await actualizarEstadoRegistro(
      estado.modalRegistroId,
      document.getElementById('modal-estado-select')?.value || 'pendiente_investigacion',
      document.getElementById('modal-estado-nota')?.value || ''
    );
  });

  cargarMaterialesFaltantes();
})();
</script>
